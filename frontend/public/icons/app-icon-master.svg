    <rect x="-85" y="-40" width="170" height="80" rx="16"/>
    <circle cx="-60" cy="45" r="20"/>
    <circle cx="60" cy="45" r="20"/>
    <rect x="-65" y="-62" width="130" height="28" rx="14"/>
    <line x1="-50" y1="-40" x2="-50" y2="-62"/>
    <line x1="50" y1="-40" x2="50" y2="-62"/>
